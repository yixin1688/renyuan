name: Docker Build

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build with Docker Compose
        run: docker compose build

      - name: Build summary
        run: |
          echo "Docker images built successfully"
          docker images
